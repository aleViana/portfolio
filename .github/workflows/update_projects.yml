name: Update Projects Data

on:
  schedule:
    - cron: '0 0 * * *'  # every 24 hours
  workflow_dispatch:        # allows manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch GitHub repos
        run: |
          curl -s "https://api.github.com/users/aleViana/repos?sort=updated&per_page=6" \
          | jq '[.[] | {name: .name, description: .description, url: .html_url, stars: .stargazers_count, language: .language, updated: .updated_at}]' \
          > data/projects.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/projects.json
          git diff --staged --quiet || git commit -m "Auto-update projects data"
          git push