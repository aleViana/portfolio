name = "portfolio1"
compatibility_date = "2026-07-15"

# This is the config the "portfolio1" Cloudflare Pages/Workers Builds project
# actually deploys from (its Deploy command is `npx wrangler deploy`, run at
# the repo root). It serves the static site as-is — no server-side code.
# The separate "currently working on" API has its own config at
# worker/wrangler.toml and is deployed independently by
# .github/workflows/deploy-worker.yml, not by this project's build.
[assets]
directory = "./"
